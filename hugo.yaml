# Hugo configuration file
title: Vertexcover Labs 

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - identifier: home
      name: Home
      pageRef: /
      weight: 1
      params:
        type: essential
    - identifier: writing
      name: Writing
      pageRef: /writing/
      weight: 2
    - identifier: hire-us
      name: Hire Us
      url: https://vertexcover.io 
      weight: 3
      params:
        type: essential
    - identifier: search
      weight: 4
      params:
        type: search
    - identifier: oss
      name: OSS
      weight: 5
      url: "https://github.com/vertexcover-io"
      params:
        icon: github
    - identifier: twitter
      name: Twitter
      weight: 6
      url: "https://twitter.com/krg85"
      params:
        icon: x-twitter
    - identifier: case-studies
      name: Case Studies
      pageRef: /case-studies/
      weight: 7
    - identifier: experiments
      name: Experiments
      pageRef: /experiments/
      weight: 8
    - identifier: hiring
      name: Hiring
      pageRef: /hiring/
      weight: 9
    - identifier: services
      name: Services
      pageRef: /services/
      weight: 10

params:
  navbar:
    displayTitle: false
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
