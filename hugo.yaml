# Hugo configuration file
title: Vertexcover Labs 

# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /
      weight: 1
    - name: Hire Us
      url: https://vertexcover.io 
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: OSS
      weight: 5
      url: "https://github.com/vertexcover-io"
      params:
        icon: github
    - name: Twitter
      weight: 6
      url: "https://twitter.com/krg85"
      params:
        icon: x-twitter

params:
  navbar:
    displayTitle: false
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
